<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aesha's Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#e8e8e8;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 24px}
.avatar{width:80px;height:80px;border-radius:50%;background:#1e1e1e;border:2px solid #f07ab8;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:500;color:#f07ab8;margin:0 auto 20px}
.name{font-size:24px;font-weight:500;margin-bottom:6px}
.sub{font-size:13px;color:#444;margin-bottom:36px}
.enter-btn{display:inline-flex;align-items:center;gap:10px;background:#f07ab8;color:#0e0e0e;text-decoration:none;border-radius:12px;padding:14px 32px;font-size:14px;font-weight:500;transition:opacity 0.15s}
.enter-btn:hover{opacity:0.85}
.arrow{font-size:18px}
.footer{margin-top:40px;font-size:11px;color:#333}
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar">A</div>
  <div class="name">Aesha</div>
  <div class="sub">Personal Dashboard</div>
  <a class="enter-btn" href="aesha-dashboard.html">
    Enter Dashboard <span class="arrow">&#8594;</span>
  </a>
  <div class="footer">Protected with a PIN</div>
</div>
</body>
</html>
